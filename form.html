<!DOCTYPE html>
<html>
    <head>
<style>
    body{
        background-color: white}
        
        form{
            width: 75%;
            border: 1px solid black;
            padding: 2px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px black;
           text-align: center;
           background-color: burlywood;
           margin: auto;
          
            
           
        }
        
        }
</style>
</head>
<body>

<h2 style="color: aqua; text-align: center; background-color: cadetblue;">Registration form </h2>

<form>
  <label for="fname" >First name:</label>
  <input type="text" id="fname" name="fname" value=""><br
  <label for="lname">Last name:</label>
  <input type="text" id="lname" name="lname" value=""><br>
  <label for="gender">Gender:</label>
  <select id="gender" name="gender">
    <option value="select">Select</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select><br>
  <label for="country">Country:</label>
  <select id="country" name="country">
    <option value="select">Select Country</option>
    <option value="india">India</option>
    <option value="usa">USA</option>
    <option value="uk">UK</option>
  </select><br>
  <label for="state">State:</label>
  <select id="state" name="state">
    <option value="select">Select State</option>
    <option value="bihar">Bihar</option>
    <option value="Bihar">Bihar</option>
    <option value="Bihar">Bihar</option>
  </select><br>
  <input type="submit" value="Submit" style="color: rgb(218, 95, 7); background-color: rgb(55, 84, 129); padding: 5px; border-radius: 5px; border: none; cursor: pointer;">
  <input type="reset" value="Reset" style="background-color: beige;border-radius: 5px;"    >

</form>


</body>
</html>
